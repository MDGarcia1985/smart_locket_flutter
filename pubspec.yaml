name: smart_locket_flutter
version: 1.1.0+2
description: Mobile application for managing Bluetooth-enabled smart locket devices
environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  flutter_blue_plus: ^1.31.16
  permission_handler: ^11.3.1
  file_picker: ^8.0.3
  image: ^4.2.0       # CPU image resize/convert
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  collection: ^1.18.0

flutter:
  assets:
    - app_metadata.json

dev_dependencies:
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutterfire_cli: ^1.3.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter